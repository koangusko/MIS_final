services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      TZ: ${TZ:-Asia/Taipei}
      PORT: 8080
      # 容器內固定連 db 服務（覆蓋 .env 的本機 DATABASE_URL）
      DATABASE_URL: postgresql://${POSTGRES_USER:-screenpact}:${POSTGRES_PASSWORD:-screenpact}@db:5432/${POSTGRES_DB:-screenpact}
    ports:
      # 只綁本機；對外由 host nginx 反代（正式環境安全做法）
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-screenpact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screenpact}
      POSTGRES_DB: ${POSTGRES_DB:-screenpact}
      TZ: ${TZ:-Asia/Taipei}
    ports:
      # 對本機開放，讓在 host 跑的 dev server 連得到（正式上線可移除）
      # 用非標準 host port 15432（避開可能過濾 5432 的本機安全工具/代理）
      - "127.0.0.1:15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screenpact}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
