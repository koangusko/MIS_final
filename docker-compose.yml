services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      TZ: ${TZ:-Asia/Taipei}
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-screenpact}:${POSTGRES_PASSWORD:-screenpact}@db:5432/${POSTGRES_DB:-screenpact}}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-screenpact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screenpact}
      POSTGRES_DB: ${POSTGRES_DB:-screenpact}
      TZ: ${TZ:-Asia/Taipei}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screenpact}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
